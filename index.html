const CSS=`
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}

.ch{transition:all .22s;cursor:pointer}.ch:hover{transform:translateY(-2px);border-color:#C9A84C!important}
.bg{background:linear-gradient(135deg,#C9A84C,#E8C96A);color:#000;border:none;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:600;letter-spacing:.06em;transition:opacity .2s,transform .2s}.bg:hover{opacity:.88;transform:translateY(-1px)}
.bo{background:transparent;color:#C9A84C;border:1px solid #C9A84C;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:500;transition:all .2s}.bo:hover{background:#C9A84C;color:#000}
.bgh{background:transparent;color:#777;border:1px solid #2C2C2C;cursor:pointer;font-family:Montserrat,sans-serif;font-size:12px;transition:all .2s}.bgh:hover{color:#F0EAD6;border-color:#777}
.sr{transition:background .15s;cursor:pointer}.sr:hover{background:rgba(201,168,76,.06)!important}.sr.sl{background:rgba(201,168,76,.1)!important;border-left:2px solid #C9A84C!important}
.pin{cursor:pointer;transition:transform .2s;position:absolute;transform:translate(-50%,-50%)}.pin:hover{transform:translate(-50%,-50%) scale(1.4)}
.tag{background:#1E1E1E;border:1px solid #2C2C2C;color:#777;border-radius:20px;padding:3px 10px;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}.tag:hover,.tag.on{background:rgba(201,168,76,.1);border-color:#C9A84C;color:#C9A84C}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(6px);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.ci{cursor:pointer;transition:all .25s;border-radius:12px;overflow:hidden;background:#171717;border:2px solid #2C2C2C}.ci:hover{border-color:#C9A84C;transform:translateY(-3px)}.ci.sel{border-color:#C9A84C;background:#1A1A1A}
`;

                <div style={{display:'flex',gap:9,alignItems:'center',marginBottom:9}}><Av init={s.n} size={36}/><div><div style={{fontSize:13,fontWeight:600,fontFamily:'Montserrat',color:'#F0EAD6'}}>{s.n}</div><div style={{fontSize:11,color:'#666',fontFamily:'Montserrat'}}>{s.area}</div></div></div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}}><div style={{display:'flex',alignItems:'center',gap:5}}><Stars r={s.r} size={11}/><span style={{fontSize:11,color:'#C9A84C',fontWeight:600,fontFamily:'Montserrat'}}>{s.r}</span></div><span style={{fontSize:12,color:'#C9A84C',fontWeight:600,fontFamily:'Montserrat'}}>₹{s.p}+</span></div>
                <button className="bg" style={{width:'100%',padding:'8px',borderRadius:6,fontSize:12}}>View & Book</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ShopView({shop,onBack,onBook,mode,idx}){
  const [tab,setTab]=useState('cuts');
  const [selS,setSelS]=useState(null);
  const [imgV,setImgV]=useState(null);
  const svcs=tab==='cuts'?HAIRCUTS.slice(0,6+(idx%4)):SHAVES.slice(0,3+(idx%3));
  const portfolio=Array.from({length:6},(_,j)=>pimg(idx,j));
  const adjPrice=(base)=>base+Math.floor((shop.p-200)/50)*10;
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{background:'#171717',borderBottom:'1px solid #2C2C2C',padding:'13px 18px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <button onClick={onBack} className="bgh" style={{borderRadius:6,padding:'7px 13px'}}>← Back</button>
        <Av init={shop.n} size={42}/>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap',marginBottom:2}}>
            <span style={{fontFamily:'Cormorant Garamond,serif',fontSize:20,fontWeight:600,color:'#F0EAD6'}}>{shop.n}</span>
            {shop.v&&<Bdg ch="✓ Verified"/>}
            {shop.note&&<Bdg c='#E8C96A' ch={shop.note}/>}
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
            <Stars r={shop.r}/><span style={{fontSize:12,color:'#C9A84C',fontWeight:600,fontFamily:'Montserrat'}}>{shop.r}</span>
            <span style={{fontSize:12,color:'#666',fontFamily:'Montserrat'}}>({shop.rv} reviews)</span>
            <span style={{fontSize:12,color:'#666',fontFamily:'Montserrat'}}>📍 {shop.area}</span>
            <span style={{fontSize:12,color:'#666',fontFamily:'Montserrat'}}>⏱ {shop.w} wait</span>
          </div>
        </div>
        <div style={{flexShrink:0,textAlign:'right'}}><div style={{fontSize:11,color:'#666',fontFamily:'Montserrat'}}>From</div><div style={{fontSize:20,fontWeight:700,color:'#C9A84C',fontFamily:'Montserrat'}}>₹{shop.p}</div></div>
      </div>
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        <div style={{flex:1,padding:18,overflowY:'auto',borderRight:'1px solid #2C2C2C'}}>
          <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:18,color:'#C9A84C',marginBottom:13}}>Portfolio</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7,marginBottom:18}}>
            {portfolio.map((img,i)=>(
              <div key={i} onClick={()=>setImgV(img)} style={{aspectRatio:'1',borderRadius:7,overflow:'hidden',cursor:'pointer',border:'1px solid #2C2C2C',transition:'all .25s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#C9A84C';e.currentTarget.style.transform='scale(1.02)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#2C2C2C';e.currentTarget.style.transform='scale(1)';}}>
                <img src={img} alt="" onError={e=>{e.target.src=`https://picsum.photos/seed/${idx*7+i+10}/400/400`;}} style={{width:'100%',height:'100%',objectFit:'cover',transition:'transform .3s'}}/>
              </div>
            ))}
          </div>
          <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:15,color:'#C9A84C',marginBottom:7}}>Specialties</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:18}}>{shop.sp.map(x=><span key={x} className="tag on">{x}</span>)}</div>
          <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:15,color:'#C9A84C',marginBottom:9}}>Recent Reviews</div>
          {[['Ravi K.','Best fade in the city. Absolute precision.',5],['Meera S.',"My husband won't go anywhere else now.",4.5],['Arjun P.','Clean, fast, exactly what I asked for.',4]].map(([n,t,r])=>(
            <div key={n} style={{background:'#171717',border:'1px solid #2C2C2C',borderRadius:7,padding:11,marginBottom:7}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:13,fontWeight:600,fontFamily:'Montserrat',color:'#F0EAD6'}}>{n}</span><Stars r={r} size={11}/></div>
              <p style={{fontSize:12,color:'#666',fontFamily:'Montserrat',lineHeight:1.5}}>{t}</p>
            </div>
          ))}
        </div>
        <div style={{width:290,display:'flex',flexDirection:'column',background:'#171717',flexShrink:0}}>
          <div style={{padding:'13px 15px',borderBottom:'1px solid #2C2C2C'}}>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:16,color:'#C9A84C',marginBottom:9}}>Book a Service</div>
            <div style={{display:'flex',background:'#111',borderRadius:7,overflow:'hidden'}}>
              {[['cuts','✂ Haircuts'],['shaves','🪒 Shaves']].map(([k,l])=>(
                <button key={k} onClick={()=>{setTab(k);setSelS(null);}} style={{flex:1,padding:'7px',fontSize:11,fontWeight:600,border:'none',cursor:'pointer',background:tab===k?'#C9A84C':'transparent',color:tab===k?'#000':'#666',fontFamily:'Montserrat',transition:'all .2s'}}>{l}</button>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {svcs.map(svc=>(
              <div key={svc.id} className={`sr${selS?.id===svc.id?' sl':''}`} onClick={()=>setSelS(selS?.id===svc.id?null:svc)} style={{padding:'11px 14px',borderBottom:'1px solid #2C2C2C',borderLeft:'2px solid transparent',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600,fontFamily:'Montserrat',color:'#F0EAD6',marginBottom:2}}>{svc.name}</div>
                  <div style={{fontSize:10.5,color:'#666',marginBottom:3,fontFamily:'Montserrat'}}>{svc.desc}</div>
                  <span style={{fontSize:10,color:'#666',background:'#1E1E1E',padding:'2px 6px',borderRadius:9,fontFamily:'Montserrat'}}>⏱ {svc.time}</span>
                </div>
                <div style={{textAlign:'right',marginLeft:8}}><div style={{fontSize:14,fontWeight:700,color:'#C9A84C',fontFamily:'Montserrat'}}>₹{adjPrice(svc.price)}</div></div>
              </div>
            ))}
          </div>
          <div style={{padding:'13px 15px',borderTop:'1px solid #2C2C2C'}}>
            {selS&&<div style={{background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.3)',borderRadius:7,padding:'10px 12px',marginBottom:9}}>
              <div style={{color:'#C9A84C',fontWeight:600,fontSize:12,fontFamily:'Montserrat',marginBottom:2}}>{selS.name}</div>
              <div style={{display:'flex',justifyContent:'space-between',color:'#666',fontSize:11,fontFamily:'Montserrat'}}><span>⏱ {selS.time}</span><span style={{color:'#C9A84C',fontWeight:700}}>₹{adjPrice(selS.price)}</span></div>
            </div>}
            <button className="bg" disabled={!selS} onClick={()=>selS&&onBook({...selS,price:adjPrice(selS.price)})} style={{width:'100%',padding:'11px',borderRadius:7,fontSize:13,opacity:selS?1:.5,cursor:selS?'pointer':'not-allowed'}}>
              {selS?'Book Appointment →':'Select a Service'}
            </button>
            {mode==='home'&&shop.hs&&<button className="bo" disabled={!selS} onClick={()=>selS&&onBook({...selS,name:selS.name+' (Home)',price:adjPrice(selS.price)+150})} style={{width:'100%',padding:'9px',borderRadius:7,fontSize:12,marginTop:7,opacity:selS?1:.5}}>🏠 Home Visit (+₹150)</button>}
          </div>
        </div>
      </div>
      {imgV&&<div className="mbg" onClick={()=>setImgV(null)}><div onClick={e=>e.stopPropagation()} style={{maxWidth:500,width:'100%',borderRadius:11,overflow:'hidden',border:'1px solid #C9A84C'}}><img src={imgV} alt="" style={{width:'100%',height:440,objectFit:'cover'}} onError={e=>{e.target.src='https://picsum.photos/seed/42/500/440';}} /></div></div>}
    </div>
  );
}

function BookModal({shop,svc,onDone,onClose}){
  const today=new Date().toISOString().split('T')[0];
  const [date,setDate]=useState(today);
  const [time,setTime]=useState('');
  const [repeat,setRepeat]=useState('none');
  const [notes,setNotes]=useState('');
  const iS={background:'#1E1E1E',border:'1px solid #2C2C2C',color:'#F0EAD6',borderRadius:7,padding:'9px 11px',fontSize:13,width:'100%',outline:'none',fontFamily:'Montserrat'};
  return(
    <div className="mbg" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="fu" style={{background:'#111',border:'1px solid #2C2C2C',borderRadius:13,width:'100%',maxWidth:450,overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,.85)',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{background:'#171717',padding:'17px 20px',borderBottom:'1px solid #2C2C2C',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div><div style={{fontFamily:'Cormorant Garamond,serif',fontSize:20,color:'#C9A84C',fontWeight:600}}>Book Appointment</div><div style={{fontSize:12,color:'#666',marginTop:2,fontFamily:'Montserrat'}}>{shop.n} · {shop.area}</div></div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#666',fontSize:22,cursor:'pointer',lineHeight:1}}>×</button>
        </div>
        <div style={{padding:20,display:'flex',flexDirection:'column',gap:13}}>
          <div style={{background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.25)',borderRadius:9,padding:'11px 13px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{fontSize:13,fontWeight:600,color:'#C9A84C',fontFamily:'Montserrat'}}>{svc?.name}</div><div style={{fontSize:11,color:'#666',marginTop:2,fontFamily:'Montserrat'}}>⏱ {svc?.time}</div></div>
            <div style={{fontSize:19,fontWeight:700,color:'#C9A84C',fontFamily:'Montserrat'}}>₹{svc?.price}</div>
          </div>
          <div><label style={{fontSize:10,color:'#666',fontWeight:600,letterSpacing:.1,display:'block',marginBottom:5,fontFamily:'Montserrat'}}>SELECT DATE</label><input type="date" value={date} min={today} onChange={e=>setDate(e.target.value)} style={iS}/></div>
          <div>
            <label style={{fontSize:10,color:'#666',fontWeight:600,letterSpacing:.1,display:'block',marginBottom:7,fontFamily:'Montserrat'}}>SELECT TIME</label>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5}}>
              {TIMES.map(t=><button key={t} onClick={()=>setTime(t)} style={{padding:'7px 2px',borderRadius:6,border:`1px solid ${time===t?'#C9A84C':'#2C2C2C'}`,background:time===t?'rgba(201,168,76,.15)':'#1E1E1E',color:time===t?'#C9A84C':'#666',fontSize:10.5,cursor:'pointer',fontFamily:'Montserrat',transition:'all .2s'}}>{t}</button>)}
            </div>
          </div>
          <div><label style={{fontSize:10,color:'#666',fontWeight:600,letterSpacing:.1,display:'block',marginBottom:5,fontFamily:'Montserrat'}}>REPEAT BOOKING</label><select value={repeat} onChange={e=>setRepeat(e.target.value)} style={iS}><option value="none">No repeat</option><option value="weekly">Every week</option><option value="biweekly">Every 2 weeks</option><option value="monthly">Every month</option></select></div>
          <div><label style={{fontSize:10,color:'#666',fontWeight:600,letterSpacing:.1,display:'block',marginBottom:5,fontFamily:'Montserrat'}}>NOTES (Optional)</label><input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Any special request…" style={iS}/></div>
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:9}}>
          <button onClick={onClose} className="bgh" style={{flex:1,padding:'11px',borderRadius:7,fontSize:13}}>Cancel</button>
          <button onClick={()=>{if(date&&time)onDone({date,time,repeat,notes})}} className="bg" style={{flex:2,padding:'11px',borderRadius:7,fontSize:13,opacity:date&&time?1:.5,cursor:date&&time?'pointer':'not-allowed'}}>{date&&time?'Confirm →':'Select date & time'}</button>
        </div>
      </div>
    </div>
  );
}

function BookingsView({bookings,onCancel}){
  return(
    <div style={{height:'100%',overflowY:'auto',padding:22,maxWidth:660,margin:'0 auto'}}>
      <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:25,color:'#C9A84C',marginBottom:5}}>My Bookings</div>
      <p style={{fontSize:13,color:'#666',marginBottom:18,fontFamily:'Montserrat'}}>Your upcoming and past appointments.</p>
      {bookings.length===0?(
        <div style={{textAlign:'center',padding:'60px 20px',color:'#555'}}>
          <div style={{fontSize:44,marginBottom:14}}>✂</div>
          <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:21,marginBottom:7,color:'#888'}}>No bookings yet</div>
          <p style={{fontSize:13,fontFamily:'Montserrat'}}>Explore the map to find your barber.</p>
        </div>
      ):bookings.map((b,i)=>(
        <div key={b.id} className="fu" style={{background:'#171717',border:'1px solid #2C2C2C',borderRadius:11,padding:16,marginBottom:11,animationDelay:`${i*.05}s`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:11}}>
            <div style={{display:'flex',gap:11,alignItems:'center'}}><Av init={b.shop.n} size={38}/><div><div style={{fontSize:14,fontWeight:600,fontFamily:'Montserrat',color:'#F0EAD6'}}>{b.shop.n}</div><div style={{fontSize:12,color:'#666',fontFamily:'Montserrat'}}>{b.shop.area}</div></div></div>
            <Bdg c={b.status==='cancelled'?'#E74C3C':'#2ECC71'} ch={b.status==='cancelled'?'Cancelled':'Confirmed'}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,background:'#1E1E1E',borderRadius:7,padding:'11px 13px',marginBottom:11}}>
            {[['Service',b.svc?.name],['Price',`₹${b.svc?.price}`],['Date',b.date],['Time',b.time],['Repeat',b.repeat==='none'?'One-time':b.repeat],['Type',b.mode==='home'?'Home Visit':'Salon']].map(([k,v])=>(
              <div key={k}><div style={{fontSize:10,color:'#555',letterSpacing:.08,fontWeight:600,fontFamily:'Montserrat'}}>{k.toUpperCase()}</div><div style={{fontSize:13,marginTop:1,color:k==='Price'?'#C9A84C':'#F0EAD6',fontWeight:k==='Price'?700:400,fontFamily:'Montserrat'}}>{v}</div></div>
            ))}
          </div>
          <div style={{display:'flex',gap:7}}>
            <button className="bgh" onClick={()=>onCancel(b.id)} style={{borderRadius:5,padding:'7px 13px',fontSize:11}}>Cancel</button>
            <button className="bo" style={{borderRadius:5,padding:'7px 13px',fontSize:11}}>Reschedule</button>
            {b.repeat!=='none'&&<Bdg c='#C9A84C' ch={`🔁 ${b.repeat}`}/>}
          </div>
        </div>
      ))}
    </div>
  );
}

function App(){
  const [cityScreen,setCityScreen]=useState(true);
  const [city,setCity]=useState('mumbai');
  const [view,setView]=useState('map');
  const [mode,setMode]=useState('salon');
  const [search,setSearch]=useState('');
  const [shop,setShop]=useState(null);
  const [shopIdx,setShopIdx]=useState(0);
  const [svc,setSvc]=useState(null);
  const [bookM,setBookM]=useState(false);
  const [bookings,setBookings]=useState([]);
  const [notif,setNotif]=useState(null);

  const shops=useMemo(()=>CITIES[city].shops.filter(s=>{
    const q=search.toLowerCase();
    return !q||(s.n.toLowerCase().includes(q)||s.area.toLowerCase().includes(q));
  }).filter(s=>mode==='home'?s.hs:true),[city,search,mode]);

  const notify=(msg,type='ok')=>{setNotif({msg,type});setTimeout(()=>setNotif(null),3000);};

  const goShop=(s)=>{
    const idx=CITIES[city].shops.findIndex(x=>x.n===s.n);
    setShop(s);setShopIdx(idx>=0?idx:0);setView('shop');
  };

  const confirmBook=(data)=>{
    setBookings(p=>[{id:Date.now(),shop,svc,mode,status:'confirmed',...data},...p]);
    setBookM(false);notify(`Booked at ${shop.n}!`);
  };

  const selectCity=(k)=>{setCity(k);setCityScreen(false);setView('map');setSearch('');setShop(null);};
  const confirmed=bookings.filter(b=>b.status==='confirmed').length;

  if(cityScreen) return <><G/><CitySelect onSelect={selectCity} current={city}/></>;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#080808',fontFamily:'Montserrat,sans-serif',overflow:'hidden'}}>
      <G/>
      {notif&&<Notif msg={notif.msg} type={notif.type} onClose={()=>setNotif(null)}/>}
      <Nav search={search} setSearch={setSearch} mode={mode} setMode={m=>{setMode(m);if(view==='shop')setView('map');}} bookN={confirmed} onLogo={()=>{setView('map');setShop(null);}} city={city} onCity={()=>setCityScreen(true)}/>
      {view!=='shop'&&<Tabs view={view} setView={v=>{setView(v);setShop(null);}} bookN={confirmed}/>}
      <div style={{flex:1,overflow:'hidden'}}>
        {view==='map'&&<HomeView city={city} shops={shops} onSelect={goShop} mode={mode}/>}
        {view==='browse'&&<BrowseView shops={shops} onSelect={goShop}/>}
        {view==='shop'&&shop&&<ShopView shop={shop} onBack={()=>setView('map')} onBook={s=>{setSvc(s);setBookM(true);}} mode={mode} idx={shopIdx}/>}
        {view==='bookings'&&<BookingsView bookings={bookings} onCancel={id=>setBookings(p=>p.map(b=>b.id===id?{...b,status:'cancelled'}:b))}/>}
      </div>
      {bookM&&<BookModal shop={shop} svc={svc} onDone={confirmBook} onClose={()=>setBookM(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
