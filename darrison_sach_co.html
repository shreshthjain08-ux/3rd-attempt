<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Darrison & Sach Co.</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html,body,#root{height:100%;margin:0;padding:0;background:#080808}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">


// ─── GLOBAL STYLES ──────────────────────────────────────────────────────────
const G = () => (
  <style>{`
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --g:#C9A84C;--g2:#E8C96A;--gp:#F5EAC8;
      --bk:#080808;--dk:#111;--c1:#171717;--c2:#1E1E1E;
      --br:#2C2C2C;--tx:#F0EAD6;--mu:#777;
      --gr:#2ECC71;--rd:#E74C3C;
    }
    body{background:var(--bk);color:var(--tx);font-family:'Montserrat',sans-serif;overflow-x:hidden}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-track{background:var(--dk)}
    ::-webkit-scrollbar-thumb{background:var(--g);border-radius:2px}
    .serif{font-family:'Cormorant Garamond',serif}
    .gold{color:var(--g)}
    .muted{color:var(--mu)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.4)}50%{box-shadow:0 0 0 8px rgba(201,168,76,0)}}
    .fade-up{animation:fadeUp 0.35s ease forwards}
    .card-hover{transition:all 0.25s}
    .card-hover:hover{transform:translateY(-2px);border-color:var(--g)!important}
    .btn-g{background:linear-gradient(135deg,var(--g),var(--g2));color:#000;border:none;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;letter-spacing:.06em;transition:opacity .2s,transform .2s}
    .btn-g:hover{opacity:.88;transform:translateY(-1px)}
    .btn-o{background:transparent;color:var(--g);border:1px solid var(--g);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:500;transition:all .2s}
    .btn-o:hover{background:var(--g);color:#000}
    .btn-ghost{background:transparent;color:var(--mu);border:1px solid var(--br);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:400;font-size:12px;transition:all .2s}
    .btn-ghost:hover{color:var(--tx);border-color:var(--mu)}
    .svc-row{transition:all .2s;cursor:pointer}
    .svc-row:hover{background:rgba(201,168,76,.06)!important}
    .svc-row.sel{background:rgba(201,168,76,.1)!important;border-left:2px solid var(--g)!important}
    .pin{cursor:pointer;transition:transform .2s}
    .pin:hover{transform:scale(1.4)}
    .pin.active{transform:scale(1.5)}
    img{display:block;object-fit:cover;width:100%;height:100%}
    input,select{font-family:'Montserrat',sans-serif}
    .tag{background:var(--c2);border:1px solid var(--br);color:var(--mu);border-radius:20px;padding:3px 10px;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
    .tag:hover,.tag.on{background:rgba(201,168,76,.1);border-color:var(--g);color:var(--g)}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
  `}</style>
);

// ─── DATA ────────────────────────────────────────────────────────────────────
const AREAS = ['Thane West','Mulund','Andheri West','Bandra','Dadar','Kurla','Borivali','Malad','Goregaon','Kandivali','Vasai','Mira Road','Dombivli','Kalyan','Vikhroli'];
const SPECS = ['Skin Fades','Beard Design','Classic Cuts','Hair Colour','Taper Fades','Traditional Shave','Pompadours','Kids Cuts'];

const SHOP_DATA = [
  ['Usman Cuts','USM'],['Royal Fade Studio','RFS'],['The Fade Factory','TFF'],['Bhai Bhai Salon','BBS'],
  ['Star Barber Co.','SBC'],['Classic Cuts','CCT'],['The Barber House','TBH'],['Style Zone','SZN'],
  ["Gentlemen's Den","GDN"],['New Look Salon','NLS'],['Pro Cuts Studio','PCS'],['The Trim Room','TTR'],
  ['Blade & Brush','B&B'],['Sharp & Clean','S&C'],['The Grooming Co.','TGC'],["Khan's Cuts",'KCT'],
  ['Sharma Salon','SSN'],["Rao's Barber",'RBR'],['Patel Cuts','PCT'],['Singh Style','SST'],
  ['The Heritage Barber','THB'],['Fade Kings','FKG'],['Mirror & Blade','M&B'],['The Craft Room','TCR'],
  ['Zenith Cuts','ZCT'],['Old Spice Barber','OSB'],['The Scissor Guild','TSG'],['Prime Style','PST'],
  ['Black Sheep Barber','BSB'],['The Detail Shop','TDS'],['Artisan Cuts','ACT'],['The Fifth Cut','TFC'],
  ['Urban Blades','UBL'],['The Fade Atelier','TFA'],['Crown Barber','CBR'],['The Parlour','TPR'],
  ['Midnight Barber','MBR'],['The Craft Barber','TCB'],['Gold Scissors','GSC'],['The Anchor','TAC'],
  ['Metro Cuts','MCT'],['The Blade Room','TBR'],['Signature Style','SIG'],['The Cut Lab','TCL'],
  ['District Barber','DBR'],['The Fade Den','TFD'],['Prestige Cuts','PRC'],['The Groom Room','TGR'],
  ['Velocity Barber','VBR'],['The Crown Cut','TCC'],
];

const HAIRCUTS = [
  {id:'buzz',name:'Buzz Cut',desc:'Military-clean all-over cut',price:150,time:'20 min',
   img:'https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=600&q=80&fit=crop&crop=face'},
  {id:'skinfade',name:'Skin Fade',desc:'Zero-to-length blend up the sides',price:350,time:'35 min',
   img:'https://images.unsplash.com/photo-1622286342621-4bd786c2447c?w=600&q=80&fit=crop'},
  {id:'taper',name:'Taper Fade',desc:'Gradual length taper around the edges',price:300,time:'30 min',
   img:'https://images.unsplash.com/photo-1599351614938-8c1b6bc41f4a?w=600&q=80&fit=crop'},
  {id:'pompadour',name:'Pompadour',desc:'Volume on top with tight clean sides',price:420,time:'40 min',
   img:'https://images.unsplash.com/photo-1560472354-b33ff0c44a43?w=600&q=80&fit=crop&crop=face'},
  {id:'undercut',name:'Undercut',desc:'Shaved sides with length kept on top',price:350,time:'35 min',
   img:'https://images.unsplash.com/photo-1519345182560-3f2917c472ef?w=600&q=80&fit=crop&crop=face'},
  {id:'caesar',name:'Caesar Cut',desc:'Short horizontally-cut fringe',price:200,time:'25 min',
   img:'https://images.unsplash.com/photo-1585747860715-2ba37e788b70?w=600&q=80&fit=crop'},
  {id:'quiff',name:'Quiff',desc:'Swept-up front with faded sides',price:380,time:'35 min',
   img:'https://images.unsplash.com/photo-1519869325930-281384150729?w=600&q=80&fit=crop&crop=face'},
  {id:'textured',name:'Textured Crop',desc:'Modern choppy texture with high fade',price:320,time:'30 min',
   img:'https://images.unsplash.com/photo-1534297635766-a262cdcb8ee4?w=600&q=80&fit=crop&crop=face'},
  {id:'slickback',name:'Slick Back',desc:'Combed-back style with side fade',price:340,time:'30 min',
   img:'https://images.unsplash.com/photo-1620327467532-6ebaca239d66?w=600&q=80&fit=crop&crop=face'},
  {id:'afrofade',name:'Afro Fade',desc:'Natural volume on top with tight fade',price:400,time:'40 min',
   img:'https://images.unsplash.com/photo-1618512496248-a07fe83aa8cb?w=600&q=80&fit=crop'},
];

const SHAVES = [
  {id:'clean',name:'Clean Shave',desc:'Full face razor with hot towel ritual',price:150,time:'20 min',
   img:'https://images.unsplash.com/photo-1516975080664-ed2fc6a32937?w=600&q=80&fit=crop'},
  {id:'beardtrim',name:'Beard Trim',desc:'Precision beard shaping and lines',price:200,time:'25 min',
   img:'https://images.unsplash.com/photo-1621605810871-ef4d70c48e34?w=600&q=80&fit=crop'},
  {id:'bearddesign',name:'Beard Design',desc:'Custom beard sculpting and styling',price:320,time:'35 min',
   img:'https://images.unsplash.com/photo-1566492031773-4f4e44671857?w=600&q=80&fit=crop'},
  {id:'hottowel',name:'Royal Hot Towel',desc:'Traditional straight-razor experience',price:380,time:'45 min',
   img:'https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=600&q=80&fit=crop'},
  {id:'mustache',name:'Moustache Trim',desc:'Precision moustache shaping',price:100,time:'15 min',
   img:'https://images.unsplash.com/photo-1534297635766-a262cdcb8ee4?w=600&q=80&fit=crop'},
  {id:'facial',name:'Grooming Facial',desc:'Cleanse, steam & moisturise for men',price:450,time:'50 min',
   img:'https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=600&q=80&fit=crop'},
];

// Seeded pseudo-random for deterministic data
const sr = (seed) => { let x = Math.sin(seed+1)*10000; return x-Math.floor(x); };

const BARBERS = SHOP_DATA.map(([name, initials], i) => {
  const rating = (3.6 + sr(i*7)*1.3).toFixed(1);
  const reviews = Math.floor(sr(i*13)*480 + 40);
  const specs = [SPECS[i%8], SPECS[(i+3)%8], SPECS[(i+5)%8]];
  const homeService = sr(i*19) > 0.35;
  const mapX = 5 + sr(i*3)*88;
  const mapY = 8 + sr(i*5)*82;
  const priceFrom = [150,200,250,300][Math.floor(sr(i*11)*4)];
  const portfolio = Array.from({length:6},(_,j)=>`https://picsum.photos/seed/${i*7+j+200}/400/400`);
  const cuts = HAIRCUTS.slice(0,5+Math.floor(sr(i*17)*5)).map(h=>({...h,price:h.price+Math.floor(sr(i+h.price)*100)}));
  const shv = SHAVES.slice(0,3+Math.floor(sr(i*23)*3)).map(s=>({...s,price:s.price+Math.floor(sr(i+s.price)*50)}));
  return {id:i+1,name,initials,rating:parseFloat(rating),reviews,specs,homeService,mapX,mapY,priceFrom,portfolio,cuts,shv,area:AREAS[i%AREAS.length],wait:`${5+Math.floor(sr(i)*20)} min`,verified:sr(i*29)>0.3};
});

const TIMES = ['9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','2:00 PM','2:30 PM','3:00 PM','3:30 PM','4:00 PM','4:30 PM','5:00 PM','5:30 PM','6:00 PM','6:30 PM'];

// ─── ATOMS ───────────────────────────────────────────────────────────────────
const Stars = ({rating,size=12}) => {
  const full = Math.floor(rating); const half = rating%1>=0.5; const empty = 5-full-(half?1:0);
  return <span style={{fontSize:size,color:'var(--g)',letterSpacing:-1}}>
    {'★'.repeat(full)}{half?'½':''}<span style={{color:'var(--br)'}}>{'★'.repeat(empty)}</span>
  </span>;
};

const Avatar = ({initials,size=42}) => (
  <div style={{width:size,height:size,borderRadius:'50%',background:'linear-gradient(135deg,#1E1E1E,#2A2A2A)',border:'1.5px solid var(--g)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:size/3.5,fontWeight:700,color:'var(--g)',flexShrink:0,fontFamily:'Montserrat'}}>
    {initials.slice(0,2)}
  </div>
);

const Badge = ({children,color='var(--g)'}) => (
  <span style={{background:`${color}18`,border:`1px solid ${color}44`,color,borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:600,letterSpacing:.04}}>
    {children}
  </span>
);

const Notif = ({msg,type,onClose}) => (
  <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:9999,animation:'slideDown .3s ease',background:type==='error'?'#2A0D0D':'#0D1E0D',border:`1px solid ${type==='error'?'var(--rd)':'var(--gr)'}`,borderRadius:8,padding:'11px 20px',color:type==='error'?'var(--rd)':'var(--gr)',fontFamily:'Montserrat',fontSize:13,fontWeight:500,display:'flex',gap:10,alignItems:'center',boxShadow:'0 4px 20px rgba(0,0,0,.5)',whiteSpace:'nowrap'}}>
    <span>{type==='error'?'✕':'✓'}</span>{msg}
    <span onClick={onClose} style={{cursor:'pointer',opacity:.6,marginLeft:6}}>×</span>
  </div>
);

// ─── TOP NAV ─────────────────────────────────────────────────────────────────
const TopNav = ({search,setSearch,mode,setMode,bookCount,onLogo}) => (
  <div style={{background:'var(--dk)',borderBottom:'1px solid var(--br)',padding:'0 20px',height:60,display:'flex',alignItems:'center',gap:16,position:'sticky',top:0,zIndex:100}}>
    <div onClick={onLogo} style={{cursor:'pointer',flexShrink:0}}>
      <div className="serif" style={{fontSize:18,fontWeight:700,color:'var(--g)',letterSpacing:.03,lineHeight:1}}>DARRISON &</div>
      <div className="serif" style={{fontSize:18,fontWeight:700,color:'var(--g)',letterSpacing:.03,lineHeight:1}}>SACH CO.</div>
    </div>
    <div style={{flex:1,maxWidth:420,position:'relative'}}>
      <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--mu)',fontSize:14}}>⌕</span>
      <input value={search} onChange={e=>setSearch(e.target.value)}
        placeholder="Search barber shop or area…"
        style={{width:'100%',background:'var(--c1)',border:'1px solid var(--br)',borderRadius:8,padding:'9px 12px 9px 34px',color:'var(--tx)',fontSize:13,outline:'none',transition:'border .2s'}}
        onFocus={e=>e.target.style.borderColor='var(--g)'}
        onBlur={e=>e.target.style.borderColor='var(--br)'}
      />
    </div>
    <div style={{display:'flex',background:'var(--c1)',border:'1px solid var(--br)',borderRadius:8,overflow:'hidden',flexShrink:0}}>
      {['salon','home'].map(m=>(
        <button key={m} onClick={()=>setMode(m)} style={{padding:'8px 16px',fontSize:11,fontWeight:600,letterSpacing:.08,border:'none',cursor:'pointer',transition:'all .2s',background:mode===m?'var(--g)':'transparent',color:mode===m?'#000':'var(--mu)'}}>
          {m==='salon'?'✂ SALON':'🏠 HOME'}
        </button>
      ))}
    </div>
    {bookCount>0&&<div style={{width:28,height:28,borderRadius:'50%',background:'var(--g)',color:'#000',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,animation:'pulse 2s infinite'}}>
      {bookCount}
    </div>}
  </div>
);

// ─── TAB NAV ─────────────────────────────────────────────────────────────────
const TabNav = ({view,setView,bookCount}) => (
  <div style={{background:'var(--dk)',borderBottom:'1px solid var(--br)',display:'flex',padding:'0 20px',gap:4}}>
    {[['map','◉  Map View'],['browse','◈  Browse Styles'],['bookings',`◎  My Bookings${bookCount>0?` (${bookCount})`:''}`]].map(([v,lbl])=>(
      <button key={v} onClick={()=>setView(v)} style={{background:'none',border:'none',borderBottom:view===v?'2px solid var(--g)':'2px solid transparent',color:view===v?'var(--g)':'var(--mu)',padding:'12px 16px',fontSize:12,fontWeight:600,letterSpacing:.06,cursor:'pointer',transition:'color .2s',marginBottom:-1}}>
        {lbl}
      </button>
    ))}
  </div>
);

// ─── MAP ─────────────────────────────────────────────────────────────────────
const MapArea = ({shops,onSelect,activeId,setActiveId}) => (
  <div style={{position:'relative',width:'100%',height:'100%',background:'#0C0C0C',overflow:'hidden'}}>
    <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}} xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#C9A84C" strokeWidth="0.2" opacity="0.15"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>
      {/* "Roads" */}
      {[['0%','32%','100%','48%'],['0%','68%','100%','52%'],['28%','0%','35%','100%'],['62%','0%','58%','100%'],['0%','15%','100%','22%'],['15%','0%','8%','100%']].map(([x1,y1,x2,y2],i)=>(
        <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#C9A84C" strokeWidth={i<4?1.2:.6} opacity="0.18"/>
      ))}
      {/* Area labels */}
      {['THANE WEST','ANDHERI','BANDRA','DADAR','BORIVALI','MULUND','KURLA'].map((a,i)=>(
        <text key={a} x={`${8+i*13}%`} y={`${18+(i%3)*28}%`} fill="#C9A84C" fontSize="9" opacity=".25" fontFamily="Montserrat" fontWeight="600" letterSpacing="1.5">{a}</text>
      ))}
    </svg>

    {shops.map(s=>(
      <div key={s.id} className="pin" onClick={()=>onSelect(s)}
        onMouseEnter={()=>setActiveId(s.id)} onMouseLeave={()=>setActiveId(null)}
        style={{position:'absolute',left:`${s.mapX}%`,top:`${s.mapY}%`,transform:'translate(-50%,-50%)',zIndex:activeId===s.id?20:1}}>
        <div style={{width:activeId===s.id?16:11,height:activeId===s.id?16:11,borderRadius:'50%',background:'var(--g)',border:'2px solid #0A0A0A',boxShadow:`0 0 ${activeId===s.id?14:6}px rgba(201,168,76,${activeId===s.id?.8:.4})`,transition:'all .2s'}}/>
        {activeId===s.id&&(
          <div style={{position:'absolute',bottom:22,left:'50%',transform:'translateX(-50%)',background:'#181818',border:'1px solid var(--g)',borderRadius:7,padding:'7px 12px',whiteSpace:'nowrap',pointerEvents:'none',zIndex:30}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--tx)',marginBottom:2}}>{s.name}</div>
            <div style={{fontSize:11,color:'var(--g)'}}>★ {s.rating} · ₹{s.priceFrom}+</div>
            <div style={{fontSize:10,color:'var(--mu)',marginTop:1}}>{s.area}</div>
          </div>
        )}
      </div>
    ))}

    {/* Legend */}
    <div style={{position:'absolute',bottom:12,left:12,background:'rgba(10,10,10,.85)',border:'1px solid var(--br)',borderRadius:8,padding:'8px 12px',fontSize:10,color:'var(--mu)'}}>
      <span style={{color:'var(--g)',marginRight:6}}>●</span>Barber Shop &nbsp;·&nbsp; <span style={{color:'var(--g)'}}>Click to view</span>
    </div>
  </div>
);

// ─── HOME VIEW ───────────────────────────────────────────────────────────────
const HomeView = ({shops,onSelect,mode}) => {
  const [activePin,setActivePin]=useState(null);
  return (
    <div style={{display:'flex',height:'calc(100vh - 108px)',overflow:'hidden'}}>
      <div style={{flex:'0 0 52%',borderRight:'1px solid var(--br)'}}>
        <MapArea shops={shops} onSelect={onSelect} activeId={activePin} setActiveId={setActivePin}/>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div>
            <span className="serif" style={{fontSize:20,fontWeight:600,color:'var(--g)'}}>
              {mode==='home'?'Home Service':'Nearby Barbers'}
            </span>
            <span style={{fontSize:12,color:'var(--mu)',marginLeft:10}}>{shops.length} found</span>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {shops.map((s,i)=>(
            <div key={s.id} className="card-hover" onClick={()=>onSelect(s)}
              style={{background:'var(--c1)',border:'1px solid var(--br)',borderRadius:10,padding:14,cursor:'pointer',animationDelay:`${i*.03}s`}}>
              <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                <Avatar initials={s.initials}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                    <span style={{fontSize:14,fontWeight:600}}>{s.name}</span>
                    {s.verified&&<Badge>✓ Verified</Badge>}
                    {mode==='home'&&<Badge color='var(--gr)'>🏠 Home</Badge>}
                  </div>
                  <div style={{fontSize:11,color:'var(--mu)',margin:'3px 0'}}>{s.area}</div>
                  <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                    <Stars rating={s.rating}/>
                    <span style={{fontSize:11,color:'var(--g)',fontWeight:600}}>{s.rating}</span>
                    <span style={{fontSize:11,color:'var(--mu)'}}>({s.reviews} reviews)</span>
                    <span style={{fontSize:11,color:'var(--mu)'}}>⏱ {s.wait} wait</span>
                  </div>
                  <div style={{display:'flex',gap:6,marginTop:7,flexWrap:'wrap'}}>
                    {s.specs.slice(0,2).map(sp=><span key={sp} className="tag">{sp}</span>)}
                    <span style={{fontSize:11,color:'var(--g)',fontWeight:600}}>From ₹{s.priceFrom}</span>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ─── BROWSE VIEW ─────────────────────────────────────────────────────────────
const BrowseView = ({shops,onSelect}) => {
  const [cat,setCat]=useState('cuts');
  const [selected,setSelected]=useState(null);
  const styles = cat==='cuts'?HAIRCUTS:SHAVES;
  return (
    <div style={{height:'calc(100vh - 108px)',overflowY:'auto',padding:20}}>
      {/* Category toggle */}
      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {[['cuts','✂  Haircuts'],['shaves','🪒  Shaves & Beard']].map(([k,lbl])=>(
          <button key={k} onClick={()=>{setCat(k);setSelected(null);}} className={cat===k?'btn-g':'btn-o'} style={{padding:'9px 22px',borderRadius:8,fontSize:12}}>
            {lbl}
          </button>
        ))}
      </div>

      {/* Style grid */}
      <div className="serif" style={{fontSize:22,marginBottom:14,color:'var(--g)'}}>
        Browse by {cat==='cuts'?'Haircut Style':'Shave & Beard Style'}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:12,marginBottom:selected?28:0}}>

            ).slice(0,12).map((s,i)=>(
              <div key={s.id} className="card-hover" onClick={()=>onSelect(s)}

                    <div style={{fontSize:11,color:'var(--mu)'}}>{s.area}</div>

                  <span style={{fontSize:12,color:'var(--g)',fontWeight:600}}>₹{(cat==='cuts'?s.cuts:s.shv)[0]?.price||selected.price}</span>
                </div>
                <button className="btn-g" style={{width:'100%',marginTop:10,padding:'8px',borderRadius:6,fontSize:12}}>
                  View & Book

// ─── SHOP VIEW ───────────────────────────────────────────────────────────────

// ─── BOOKING MODAL ───────────────────────────────────────────────────────────
const BookingModal = ({shop,service,onConfirm,onClose}) => {
  const today = new Date().toISOString().split('T')[0];
  const [date,setDate]=useState(today);
  const [time,setTime]=useState('');
  const [repeat,setRepeat]=useState('none');
  const [notes,setNotes]=useState('');

  const inputStyle={background:'var(--c2)',border:'1px solid var(--br)',color:'var(--tx)',borderRadius:8,padding:'10px 12px',fontSize:13,width:'100%',outline:'none'};
  return (
    <div className="modal-bg" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="fade-up"
        style={{background:'var(--dk)',border:'1px solid var(--br)',borderRadius:14,width:'100%',maxWidth:460,overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,.7)'}}>
        {/* Header */}
        <div style={{background:'var(--c1)',padding:'18px 22px',borderBottom:'1px solid var(--br)',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div className="serif" style={{fontSize:20,color:'var(--g)',fontWeight:600}}>Book Appointment</div>
            <div style={{fontSize:12,color:'var(--mu)',marginTop:2}}>{shop.name} · {shop.area}</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--mu)',fontSize:20,cursor:'pointer',lineHeight:1}}>×</button>
        </div>
        <div style={{padding:22,display:'flex',flexDirection:'column',gap:14}}>
          {/* Service summary */}
          <div style={{background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.25)',borderRadius:10,padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'var(--g)'}}>{service?.name}</div>
              <div style={{fontSize:11,color:'var(--mu)',marginTop:2}}>⏱ {service?.time}</div>
            </div>
            <div style={{fontSize:20,fontWeight:700,color:'var(--g)'}}>₹{service?.price}</div>
          </div>

          {/* Date */}
          <div>
            <label style={{fontSize:11,color:'var(--mu)',fontWeight:600,letterSpacing:.08,display:'block',marginBottom:6}}>SELECT DATE</label>
            <input type="date" value={date} min={today} onChange={e=>setDate(e.target.value)} style={inputStyle}/>
          </div>

          {/* Time slots */}
          <div>
            <label style={{fontSize:11,color:'var(--mu)',fontWeight:600,letterSpacing:.08,display:'block',marginBottom:8}}>SELECT TIME</label>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
              {TIMES.map(t=>(
                <button key={t} onClick={()=>setTime(t)}
                  style={{padding:'8px 4px',borderRadius:6,border:`1px solid ${time===t?'var(--g)':'var(--br)'}`,background:time===t?'rgba(201,168,76,.15)':'var(--c2)',color:time===t?'var(--g)':'var(--mu)',fontSize:11,cursor:'pointer',transition:'all .2s',fontFamily:'Montserrat'}}>
                  {t}
                </button>
              ))}
            </div>
          </div>

          {/* Repeat */}
          <div>
            <label style={{fontSize:11,color:'var(--mu)',fontWeight:600,letterSpacing:.08,display:'block',marginBottom:6}}>REPEAT BOOKING</label>
            <select value={repeat} onChange={e=>setRepeat(e.target.value)} style={inputStyle}>
              <option value="none">No repeat — one time</option>
              <option value="weekly">Every week (same day & time)</option>
              <option value="biweekly">Every 2 weeks</option>
              <option value="monthly">Every month</option>
            </select>
          </div>

          {/* Notes */}
          <div>
            <label style={{fontSize:11,color:'var(--mu)',fontWeight:600,letterSpacing:.08,display:'block',marginBottom:6}}>NOTES (Optional)</label>
            <input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Any preference for the barber…"
              style={{...inputStyle,}}/>
          </div>
        </div>

        <div style={{padding:'0 22px 22px',display:'flex',gap:10}}>
          <button onClick={onClose} className="btn-ghost" style={{flex:1,padding:'12px',borderRadius:8,fontSize:13}}>Cancel</button>
          <button onClick={()=>{if(date&&time)onConfirm({date,time,repeat,notes})}} className="btn-g"
            style={{flex:2,padding:'12px',borderRadius:8,fontSize:13,opacity:date&&time?1:.55,cursor:date&&time?'pointer':'not-allowed'}}>
            {date&&time?`Confirm Booking →`:'Select date & time'}
          </button>
        </div>
      </div>
    </div>
  );
};

// ─── BOOKINGS VIEW ───────────────────────────────────────────────────────────

          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <Avatar initials={b.shop.initials} size={42}/>
            <div>
              <div style={{fontSize:14,fontWeight:600}}>{b.shop.name}</div>
              <div style={{fontSize:12,color:'var(--mu)'}}>{b.shop.area}</div>

          </div>
          <Badge color={b.status==='cancelled'?'var(--rd)':'var(--gr)'}>{b.status==='cancelled'?'Cancelled':'Confirmed'}</Badge>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,background:'var(--c2)',borderRadius:8,padding:'12px 14px'}}>

          {b.repeat!=='none'&&<Badge color='var(--g)'>🔁 {b.repeat}</Badge>}
        </div>
      </div>
    ))}
  </div>
);

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [view,setView]=useState('map');
  const [mode,setMode]=useState('salon');
  const [search,setSearch]=useState('');
  const [shop,setShop]=useState(null);
  const [selSvc,setSelSvc]=useState(null);
  const [booking,setBooking]=useState(false);
  const [bookings,setBookings]=useState([]);
  const [notif,setNotif]=useState(null);

  const shops = useMemo(()=>BARBERS.filter(b=>{
    const q=search.toLowerCase();
    return (!q||(b.name.toLowerCase().includes(q)||b.area.toLowerCase().includes(q)));
  }).filter(b=>mode==='home'?b.homeService:true),[search,mode]);

  const notify=(msg,type='success')=>{
    setNotif({msg,type});
    setTimeout(()=>setNotif(null),3200);
  };

  const handleBook=(svc)=>{setSelSvc(svc);setBooking(true);};

  const confirmBook=(data)=>{
    const b={id:Date.now(),shop,service:selSvc,mode,status:'confirmed',...data};
    setBookings(p=>[b,...p]);
    setBooking(false);
    notify(`Booking confirmed at ${shop.name}!`);
  };

  const cancelBooking=(id)=>{
    setBookings(p=>p.map(b=>b.id===id?{...b,status:'cancelled'}:b));
    notify('Booking cancelled.','error');
  };

  const goToShop=(s)=>{setShop(s);setView('shop');};

  return (
    <div style={{minHeight:'100vh',background:'var(--bk)',display:'flex',flexDirection:'column'}}>
      <G/>
      {notif&&<Notif {...notif} onClose={()=>setNotif(null)}/>}

      <TopNav search={search} setSearch={setSearch} mode={mode} setMode={m=>{setMode(m);if(view==='shop')setView('map');}} bookCount={bookings.filter(b=>b.status==='confirmed').length} onLogo={()=>{setView('map');setShop(null);}}/>

      {view!=='shop'&&<TabNav view={view} setView={v=>{setView(v);setShop(null);}} bookCount={bookings.filter(b=>b.status==='confirmed').length}/>}

      {view==='map'&&<HomeView shops={shops} onSelect={goToShop} mode={mode}/>}
      {view==='browse'&&<BrowseView shops={shops} onSelect={goToShop}/>}
      {view==='shop'&&shop&&<ShopView shop={shop} onBack={()=>setView('map')} onBook={handleBook} mode={mode}/>}
      {view==='bookings'&&<BookingsView bookings={bookings} onCancel={cancelBooking}/>}

      {booking&&<BookingModal shop={shop} service={selSvc} onConfirm={confirmBook} onClose={()=>setBooking(false)}/>}
    </div>
  );
}

const { useState, useMemo } = React;
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
